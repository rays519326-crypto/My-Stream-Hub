<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeStream - Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d11; color: #e5e7eb; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        
        <header class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 border-b border-gray-800 pb-6">
            <h1 class="text-3xl font-extrabold text-indigo-500 tracking-wide">AnimeStream</h1>
            <div class="w-full sm:w-72 flex gap-2">
                <input type="text" id="search-input" placeholder="Search anime title..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">
                <button id="search-btn" class="bg-indigo-600 hover:bg-indigo-700 px-5 py-2 rounded-lg text-sm font-semibold transition">Go</button>
            </div>
        </header>

        <main>
            <div id="player-container" class="hidden mb-10">
                <h2 id="playing-title" class="text-xl font-bold mb-3 text-indigo-400">Now Streaming</h2>
                <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden border-2 border-gray-800 shadow-2xl">
                    <iframe id="video-player" class="absolute top-0 left-0 w-full h-full" allowfullscreen sandbox="allow-scripts allow-same-origin"></iframe>
                </div>
                <div class="mt-4">
                    <p class="text-sm font-semibold text-gray-400 mb-2">Select Episode:</p>
                    <div id="episode-list" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto p-1"></div>
                </div>
            </div>

            <h2 id="section-title" class="text-xl font-bold mb-6 text-gray-300">Top Trending Anime</h2>
            <div id="anime-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5"></div>
        </main>
    </div>

    <script>
        const JIKAN_API = "https://api.jikan.moe/v4";
        const STREAM_BASE = "https://vidsrc.to/embed/anime";

        const searchInput = document.getElementById("search-input");
        const searchBtn = document.getElementById("search-btn");
        const animeGrid = document.getElementById("anime-grid");
        const playerContainer = document.getElementById("player-container");
        const videoPlayer = document.getElementById("video-player");
        const playingTitle = document.getElementById("playing-title");
        const episodeList = document.getElementById("episode-list");
        const sectionTitle = document.getElementById("section-title");

        // Automatically fetch trending shows on startup
        async function loadTrendingAnime() {
            try {
                const response = await fetch(`${JIKAN_API}/top/anime?limit=15`);
                const result = await response.json();
                displayGrid(result.data);
            } catch (error) { console.error("Error fetching trend data:", error); }
        }

        searchBtn.addEventListener("click", searchAnime);
        searchInput.addEventListener("keypress", (e) => { if (e.key === "Enter") searchAnime(); });

        async function searchAnime() {
            const query = searchInput.value.trim();
            if (!query) return;
            sectionTitle.textContent = `Search Results for "${query}"`;
            animeGrid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-10">Searching archives...</p>';
            try {
                const response = await fetch(`${JIKAN_API}/anime?q=${query}&limit=20`);
                const result = await response.json();
                displayGrid(result.data);
            } catch (error) { console.error("Error searching titles:", error); }
        }

        function displayGrid(animeList) {
            animeGrid.innerHTML = "";
            if (!animeList || animeList.length === 0) {
                animeGrid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-10">No titles match your search.</p>';
                return;
            }
            animeList.forEach(anime => {
                const item = document.createElement("div");
                item.className = "bg-gray-900 rounded-lg overflow-hidden shadow-md cursor-pointer transform hover:scale-105 transition duration-200 border border-gray-800 flex flex-col justify-between";
                item.innerHTML = `
                    <img src="${anime.images.jpg.image_url}" alt="${anime.title}" class="w-full h-56 object-cover">
                    <div class="p-3">
                        <p class="font-bold text-sm line-clamp-2 text-gray-200">${anime.title}</p>
                        <div class="flex justify-between text-[11px] text-gray-500 mt-2">
                            <span>${anime.type || 'TV'}</span>
                            <span>${anime.episodes || '?'} Episodes</span>
                        </div>
                    </div>
                `;
                item.addEventListener("click", () => initializePlayer(anime));
                animeGrid.appendChild(item);
            });
        }

        function initializePlayer(anime) {
            playerContainer.classList.remove("hidden");
            playingTitle.textContent = `Streaming Now: ${anime.title}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            episodeList.innerHTML = "";
            const episodesCount = anime.episodes || 12; // Default to 12 if continuous/ongoing
            
            for (let i = 1; i <= episodesCount; i++) {
                const epButton = document.createElement("button");
                epButton.className = "bg-gray-800 hover:bg-indigo-600 text-gray-200 font-semibold text-xs py-2 px-4 rounded-md transition duration-150";
                epButton.textContent = `Ep ${i}`;
                epButton.addEventListener("click", () => {
                    Array.from(episodeList.children).forEach(b => b.classList.replace("bg-indigo-600", "bg-gray-800"));
                    epButton.classList.replace("bg-gray-800", "bg-indigo-600");
                    
                    // Force the sandboxed stream link
                    videoPlayer.src = `${STREAM_BASE}/${anime.mal_id}/${i}`;
                });
                episodeList.appendChild(epButton);
            }
            if (episodeList.firstChild) episodeList.firstChild.click();
        }

        loadTrendingAnime();
    </script>
</body>
  </html>
